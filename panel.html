<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Panel · Itinerancias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container panel-page">
    <header class="panel-header">
      <div>
        <h1>Panel de unidad</h1>
        <p id="usuarioInfo" class="muted"></p>
      </div>
      <button type="button" id="btnLogout" class="secundario">Cerrar sesión</button>
    </header>

    <p id="msg" class="msg"></p>

    <section class="panel-unificado">
      <div class="panel-unificado-header">
        <div>
          <h2>Mis itinerancias y propuestas</h2>
          <p class="muted">Consulta tus itinerancias publicadas y las propuestas enviadas a Dirección Provincial.</p>
        </div>
        <a class="btn" href="nueva-itinerancia.html">Nueva propuesta</a>
      </div>

      <div class="filtros-unificados">
        <input type="text" id="filtroPanelUnificado" placeholder="Filtrar por municipio, estado, técnico/a, frecuencia, dirección, observaciones...">

        <select id="filtroEstadoUnificado">
          <option value="PUBLICADA" selected>Publicadas</option>
          <option value="ACTIVAS">Activas</option>
          <option value="">Todas</option>
          <option value="BORRADOR">Borradores</option>
          <option value="PENDIENTE_VALIDACION">Pendientes</option>
          <option value="RECHAZADA">Rechazadas</option>
          <option value="ARCHIVADA">Archivadas</option>
        </select>
      </div>

      <div id="listaUnificada" class="lista-unificada">
        <p class="muted">Cargando itinerancias y propuestas...</p>
      </div>
    </section>

    <div class="oculto">
      <div id="listaPublicadas"></div>
      <div id="listaPropuestas"></div>
    </div>
  </main>




  
  <dialog id="modalListadoActividades">
    <div class="modal-card modal-listado-actividades-card">
      <div class="modal-listado-header">
        <div>
          <h2 id="listadoActividadesTitulo">Actividades registradas</h2>
          <p id="listadoActividadesSubtitulo" class="muted"></p>
        </div>
        <button type="button" id="btnCerrarListadoActividades" class="secundario">Cerrar</button>
      </div>

      <div class="filtro-actividad-modal">
        <input type="text" id="filtroActividades" placeholder="Filtrar por fecha, técnico/a, tipo, observaciones...">
      </div>

      <div id="contenidoListadoActividades" class="tabla-actividades-modal"></div>
    </div>
  </dialog>


  



  <dialog id="modalActividad">
    <form method="dialog" class="modal-card modal-actividad-card">
      <h2 id="actividadModalTitulo">Registrar actividad</h2>
      <p id="msgActividad" class="msg msg-modal"></p>

      <input type="hidden" id="actividadItineranciaId">
      <input type="hidden" id="actividadRegistroId">

      <div class="actividad-info" id="actividadInfo"></div>

      <div class="form-grid-actividad">
        <label>
          Fecha de actividad
          <input type="date" id="actividadFecha" required>
        </label>

        <label>
          Personal técnico
          <input type="text" id="actividadTecnico" required>
        </label>

        <label>
          Nº de atenciones
          <input type="number" id="actividadAtenciones" min="0" step="1" required placeholder="Ej.: 0, 1, 2...">
        </label>

        <label>
          Tipo de atención
          <select id="actividadTipo">
            <option value="">Seleccionar...</option>
            <option value="Presencial Individual">Presencial Individual</option>
            <option value="Presencial Grupal">Presencial Grupal</option>
            <option value="Telefónica">Telefónica</option>
            <option value="Otra">Otra</option>
          </select>
        </label>

        <label>
          Horas
          <input type="number" id="actividadHoras" min="0" max="7" step="1" required placeholder="Horas">
        </label>

        <label>
          Minutos
          <select id="actividadMinutos" required>
            <option value="">Seleccionar...</option>
            <option value="0">00</option>
            <option value="1">01</option>
            <option value="2">02</option>
            <option value="3">03</option>
            <option value="4">04</option>
            <option value="5">05</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="25">25</option>
            <option value="30">30</option>
            <option value="35">35</option>
            <option value="40">40</option>
            <option value="45">45</option>
            <option value="50">50</option>
            <option value="55">55</option>
          </select>
        </label>

        <label class="span-2">
          Observaciones
          <textarea id="actividadObservaciones" rows="4" minlength="5" placeholder="Obligatorio si el tiempo total es 00:00."></textarea>
        </label>
      </div>


      <div class="acciones modal-actions">
        <button type="button" id="btnGuardarActividad">Guardar actividad</button>
        <button type="button" id="btnCancelarActividad" class="secundario">Cancelar</button>
      </div>
    </form>
  </dialog>


  



  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js?v=20260717-oculta-propuestas-publicadas-fix"></script>

</body>
</html>
