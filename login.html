<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Acceso · Itinerancias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css?v=20260723-cambio-clave-manual-v1">
</head>
<body>
  <main class="contenedor">
    <section class="card">
      <h1>Acceso de unidades</h1>
      <p class="muted">Introduce tu correo y clave para acceder al panel.</p>

      <form id="formLogin" class="form-login-principal">
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" required>

        <label>Clave</label>
        <input type="password" id="loginPassword" required>

        <button type="submit">Entrar</button>
      </form>

      <p id="msg" class="msg"></p>

      <p class="enlace-secundario">
        <button type="button" id="btnRecordarClave" class="btn-enlace">Solicitar cambio de clave</button>
      </p>

      <section id="bloqueNuevaClave" class="bloque-nueva-clave oculto bloque-desactivado-recuperacion">
        <h2>Cambiar clave de acceso</h2>
        <p class="muted">Introduce dos veces la nueva clave. Este formulario solo está disponible para usuarios activos.</p>

        <form id="formNuevaClave">
          <label>Nueva clave</label>
          <input type="password" id="nuevaClave" required minlength="8">

          <label>Repetir nueva clave</label>
          <input type="password" id="nuevaClave2" required minlength="8">

          <button type="submit">Guardar nueva clave</button>
        </form>
      </section>

      <p class="enlace-secundario">
        ¿No tienes usuario? <a href="solicitar-acceso.html">Solicitar acceso</a>
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js?v=20260723-cambio-clave-manual-v1"></script>
</body>
</html>
