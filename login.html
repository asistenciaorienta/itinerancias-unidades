<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Acceso · Itinerancias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css?v=20260720-github-pages-fix-dias-textos">
</head>
<body>
  <main class="contenedor">
    <section class="card">
      <h1>Acceso de unidades</h1>
      <p class="muted">Introduce tu correo y clave para acceder al panel.</p>

      <form id="formLogin">
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" required>

        <label>Clave</label>
        <input type="password" id="loginPassword" required>

        <button type="submit">Entrar</button>
      </form>

      <p id="msg" class="msg"></p>

      <p class="enlace-secundario">
        ¿No tienes usuario? <a href="solicitar-acceso.html">Solicitar acceso</a>
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js?v=20260720-github-pages-fix-dias-textos"></script>
</body>
</html>
