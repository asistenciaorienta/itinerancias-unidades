<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Solicitar acceso · Itinerancias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css?v=20260723-mensaje-error-reset-smtp">
</head>
<body>
  <main class="contenedor">
    <section class="card">
      <h1>Solicitar acceso</h1>
      <p class="muted">
        La solicitud será revisada por Dirección Provincial. No se crea el usuario automáticamente.
      </p>

      <form id="formSolicitudAcceso">
        <label>Nombre y apellidos</label>
        <input type="text" id="solNombre" required>

        <label>Correo electrónico</label>
        <input type="email" id="solEmail" required>

        <label>Teléfono</label>
        <input type="text" id="solTelefono">

        <label>Unidad / entidad</label>
        <input type="text" id="solUnidad" required>
        <input type="hidden" id="solUnidadId">
        <input type="hidden" id="solConvocatoriaId">

        <label>Cargo o función</label>
        <input type="text" id="solCargo">

        <label>Observaciones</label>
        <textarea id="solObservaciones" rows="4"></textarea>

        <button type="submit">Enviar solicitud</button>
      </form>

      <p id="msg" class="msg"></p>

      <p class="enlace-secundario">
        <a href="index.html">Volver al inicio</a>
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js?v=20260723-mensaje-error-reset-smtp"></script>
</body>
</html>
