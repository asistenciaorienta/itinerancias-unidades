<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Nueva propuesta · Itinerancias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css?v=20260720-etiqueta-tipo-propuesta">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Nueva propuesta de itinerancia</h1>
      <p class="muted">La propuesta quedará pendiente de validación.</p>
    </div>

    <nav>
      <a class="btn secundario" href="panel.html">Volver</a>
      <button id="btnLogout" class="btn peligro">Salir</button>
    </nav>
  </header>

  <main class="contenedor ancho">
    <section class="card">
      <form id="formNuevaItinerancia">
        <label>Tipo de propuesta</label>
        <select id="tipo" required>
          <option value="NUEVA">Nueva itinerancia</option>
          <option value="MODIFICACION">Modificación de itinerancia existente</option>
          <option value="BAJA">Baja de itinerancia</option>
        </select>

        <div id="bloqueItineranciaExistente" class="bloque-itinerancia-existente oculto">
          <label for="itineranciaPublicadaId">Itinerancia existente</label>
          <select id="itineranciaPublicadaId">
            <option value="">Seleccionar itinerancia...</option>
          </select>
          <p class="muted ayuda-formulario">
            Selecciona la itinerancia publicada sobre la que solicitas la modificación o baja.
          </p>
        </div>

        <label>Municipio</label>
        <input type="text" id="municipio" required>

        <label>Dirección / lugar de realización</label>
        <input type="text" id="direccion">

        <label>Día/Días</label>
        <input type="text" id="horario" required placeholder="Ej.: Martes / Martes y Jueves / 1er y 3er Miércoles / mes">

        <label>Frecuencia</label>
        <select id="frecuencia" required>
          <option value="">Seleccionar...</option>
          <option value="Semanal">Semanal</option>
          <option value="Quincenal">Quincenal</option>
          <option value="Mensual">Mensual</option>
          <option value="Puntual">Puntual</option>
          <option value="A demanda / cita previa">A demanda / cita previa</option>
          <option value="Otra periodicidad">Otra periodicidad</option>
        </select>

        <div class="grid2">
          <div>
            <label>Fecha de inicio</label>
            <input type="date" id="fechaInicio">
          </div>

          <div>
            <label>Fecha de fin</label>
            <input type="date" id="fechaFin">
          </div>
        </div>

        <label>Persona de contacto</label>
        <input type="text" id="contacto">

        <label>Teléfono</label>
        <input type="text" id="telefono">

        <label>Email de contacto</label>
        <input type="email" id="emailContacto">

        <label>Observaciones públicas</label>
        <textarea id="observacionesPublicas" rows="3"></textarea>

        <label>Observaciones internas para Dirección Provincial</label>
        <textarea id="observacionesUnidad" rows="3"></textarea>

        <div class="acciones">
          <button type="button" id="btnGuardarBorrador" class="secundario">Guardar borrador</button>
          <button type="submit">Enviar a validación</button>
        </div>
      </form>

      <p id="msg" class="msg"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js?v=20260720-etiqueta-tipo-propuesta"></script>
</body>
</html>
